name: Refresh Hevy Tokens (every 10 min)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps chromium
          npm install -g vercel

      - name: Refresh Hevy tokens
        env:
          HEVY_EMAIL: ${{ secrets.HEVY_EMAIL }}
          HEVY_PASSWORD: ${{ secrets.HEVY_PASSWORD }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          python -c "
          import os, json, time

          SITE_KEY = '6LfkQG0jAAAAANTrIkVXKPfSPHyJnt4hYPWqxh0R'

          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto('https://hevy.com/login', wait_until='networkidle', timeout=15000)
              page.wait_for_timeout(3000)

              token = page.evaluate('''(sk) => {
                  return new Promise((res, rej) => {
                      grecaptcha.enterprise.ready(() => {
                          grecaptcha.enterprise.execute(sk, {action: 'login'}).then(res).catch(rej);
                      });
                  });
              }''', SITE_KEY)

              result = page.evaluate('''([email, passwd, t]) => {
                  return fetch('https://api.hevyapp.com/login', {
                      method: 'POST',
                      headers: {
                          'x-api-key': 'shelobs_hevy_web',
                          'hevy-platform': 'web',
                          'x-client-time': String(Date.now() / 1000),
                          'Content-Type': 'application/json',
                          'Accept': 'application/json',
                      },
                      body: JSON.stringify({emailOrUsername: email, password: passwd, recaptchaToken: t}),
                  }).then(r => r.json().then(data => ({status: r.status, data})));
              }''', [os.environ['HEVY_EMAIL'], os.environ['HEVY_PASSWORD'], token])

              browser.close()

          if result['status'] != 200:
              print(f'LOGIN FAILED: {result[\"data\"]}')
              exit(1)

          tokens = result['data']
          print(f'Login OK. Expires: {tokens[\"expires_at\"]}')

          # Write tokens to a file for the Vercel CLI step
          with open('tokens.json', 'w') as f:
              json.dump(tokens, f)
          "

      - name: Update Vercel env vars
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          ACCESS=$(python -c "import json; print(json.load(open('tokens.json'))['access_token'])")
          REFRESH=$(python -c "import json; print(json.load(open('tokens.json'))['refresh_token'])")
          EXPIRES=$(python -c "import json; print(json.load(open('tokens.json'))['expires_at'])")

          cd vercel
          echo "$ACCESS" | vercel env add HEVY_ACCESS_TOKEN production --token $VERCEL_TOKEN --yes
          echo "$REFRESH" | vercel env add HEVY_REFRESH_TOKEN production --token $VERCEL_TOKEN --yes
          echo "$EXPIRES" | vercel env add HEVY_TOKEN_EXPIRES production --token $VERCEL_TOKEN --yes

          vercel --prod --yes --token $VERCEL_TOKEN

          echo "Tokens refreshed and deployed"
