name: Refresh Hevy Tokens (every 10 min)

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps chromium

      - name: Refresh Hevy tokens
        env:
          HEVY_EMAIL: ${{ secrets.HEVY_EMAIL }}
          HEVY_PASSWORD: ${{ secrets.HEVY_PASSWORD }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          python -c "
          import os, json, time, urllib.request

          SITE_KEY = '6LfkQG0jAAAAANTrIkVXKPfSPHyJnt4hYPWqxh0R'
          VERCEL_TOKEN = os.environ['VERCEL_TOKEN']
          PROJECT_ID = os.environ.get('VERCEL_PROJECT_ID', 'prj_vF0FFLgTH9fymYkGRZ1UQUCQ3Iqs')

          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto('https://hevy.com/login', wait_until='networkidle', timeout=15000)
              page.wait_for_timeout(3000)

              token = page.evaluate('''(sk) => {
                  return new Promise((res, rej) => {
                      grecaptcha.enterprise.ready(() => {
                          grecaptcha.enterprise.execute(sk, {action: 'login'}).then(res).catch(rej);
                      });
                  });
              }''', SITE_KEY)

              result = page.evaluate('''([email, passwd, t]) => {
                  return fetch('https://api.hevyapp.com/login', {
                      method: 'POST',
                      headers: {
                          'x-api-key': 'shelobs_hevy_web',
                          'hevy-platform': 'web',
                          'x-client-time': String(Date.now() / 1000),
                          'Content-Type': 'application/json',
                          'Accept': 'application/json',
                      },
                      body: JSON.stringify({emailOrUsername: email, password: passwd, recaptchaToken: t}),
                  }).then(r => r.json().then(data => ({status: r.status, data})));
              }''', [os.environ['HEVY_EMAIL'], os.environ['HEVY_PASSWORD'], token])

              browser.close()

          if result['status'] != 200:
              print(f'LOGIN FAILED: {result[\"data\"]}')
              exit(1)

          tokens = result['data']
          print(f'Login OK. Expires: {tokens[\"expires_at\"]}')

          # Update Vercel env vars via REST API
          def vercel_api(method, endpoint, body=None):
              url = f'https://api.vercel.com/v9/projects/{PROJECT_ID}{endpoint}'
              headers = {'Authorization': f'Bearer {VERCEL_TOKEN}', 'Content-Type': 'application/json'}
              req = urllib.request.Request(url, method=method, headers=headers)
              if body:
                  req.data = json.dumps(body).encode()
              resp = urllib.request.urlopen(req)
              return json.loads(resp.read())

          # Get existing env vars to find their IDs
          envs = vercel_api('GET', '/env?decrypt=true')
          env_map = {e['key']: e['id'] for e in envs.get('envs', [])}

          # Update each env var
          for key, val in [
              ('HEVY_ACCESS_TOKEN', tokens['access_token']),
              ('HEVY_REFRESH_TOKEN', tokens['refresh_token']),
              ('HEVY_TOKEN_EXPIRES', tokens['expires_at']),
          ]:
              env_id = env_map.get(key)
              if env_id:
                  vercel_api('PATCH', f'/env/{env_id}', {'value': val, 'type': 'secret'})
                  print(f'  Updated {key}')
              else:
                  vercel_api('POST', '/env', {'key': key, 'value': val, 'type': 'secret', 'target': ['production']})
                  print(f'  Created {key}')

          # Redeploy to pick up new env vars
          print('Redeploying...')
          vercel_api('POST', '/deployments', {
              'name': 'hevy-vercel',
              'target': 'production',
              'projectSettings': {'framework': 'nextjs'},
          })
          print('Done! Tokens refreshed and deployed.')
          "

      - name: Notify on failure
        if: failure()
        run: echo "Hevy token refresh failed"
