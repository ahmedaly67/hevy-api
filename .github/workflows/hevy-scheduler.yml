name: Hevy Token Scheduler

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps chromium

      - name: Refresh Hevy tokens
        env:
          HEVY_EMAIL: ${{ secrets.HEVY_EMAIL }}
          HEVY_PASSWORD: ${{ secrets.HEVY_PASSWORD }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          python -c "
          import os, json, time

          SITE_KEY = '6LfkQG0jAAAAANTrIkVXKPfSPHyJnt4hYPWqxh0R'

          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto('https://hevy.com/login', wait_until='networkidle', timeout=15000)
              page.wait_for_timeout(3000)

              token = page.evaluate('''(sk) => {
                  return new Promise((res, rej) => {
                      grecaptcha.enterprise.ready(() => {
                          grecaptcha.enterprise.execute(sk, {action: 'login'}).then(res).catch(rej);
                      });
                  });
              }''', SITE_KEY)

              result = page.evaluate('''([email, passwd, t]) => {
                  return fetch('https://api.hevyapp.com/login', {
                      method: 'POST',
                      headers: {
                          'x-api-key': 'shelobs_hevy_web',
                          'hevy-platform': 'web',
                          'x-client-time': String(Date.now() / 1000),
                          'Content-Type': 'application/json',
                          'Accept': 'application/json',
                      },
                      body: JSON.stringify({emailOrUsername: email, password: passwd, recaptchaToken: t}),
                  }).then(r => r.json().then(data => ({status: r.status, data})));
              }''', [os.environ['HEVY_EMAIL'], os.environ['HEVY_PASSWORD'], token])

              browser.close()

          if result['status'] != 200:
              print(f'LOGIN FAILED: {result[\"data\"]}')
              exit(1)

          tokens = result['data']
          print(f'Login OK. Expires: {tokens[\"expires_at\"]}')

          with open('tokens.json', 'w') as f:
              json.dump(tokens, f)
          "

      - name: API Discovery — Probe POST endpoints
        run: |
          python -c "
          import json, urllib.request

          with open('tokens.json') as f:
              tokens = json.load(f)
          at = tokens['access_token']

          HEADERS = {
              'x-api-key': 'shelobs_hevy_web',
              'hevy-platform': 'web',
              'Authorization': f'Bearer {at}',
              'Content-Type': 'application/json',
              'Accept': 'application/json',
          }

          def probe(method, path, body=None):
              url = f'https://api.hevyapp.com{path}'
              data = json.dumps(body or {}).encode() if body else None
              req = urllib.request.Request(url, method=method, headers=HEADERS, data=data)
              try:
                  resp = urllib.request.urlopen(req, timeout=10)
                  return resp.status, resp.read().decode()[:300]
              except urllib.error.HTTPError as e:
                  body = e.read().decode()[:300]
                  return e.code, body

          endpoints = [
              ('POST', '/workout', {'name': 'Test', 'description': ''}),
              ('POST', '/workout', {'title': 'Test', 'exercises': []}),
              ('POST', '/v2/workout', {'name': 'Test'}),
              ('POST', '/workout_event', {}),
              ('POST', '/workout_events', {}),
              ('POST', '/start_workout', {}),
              ('POST', '/end_workout', {}),
              ('POST', '/complete_workout', {}),
              ('POST', '/finish_workout', {}),
              ('POST', '/workout/start', {}),
              ('POST', '/workout/end', {}),
              ('POST', '/workout/complete', {}),
              ('POST', '/workout/finish', {}),
              ('POST', '/log_workout', {}),
              ('POST', '/workout_session', {}),
              ('POST', '/create_workout_event', {}),
              ('POST', '/workout_exercise', {}),
              ('POST', '/workout_set', {}),
              ('POST', '/log_set', {}),
              ('POST', '/log_exercise', {}),
              ('POST', '/follow', {'user_id': 'test'}),
              ('POST', '/unfollow', {'user_id': 'test'}),
              ('POST', '/like', {'workout_short_id': 'test'}),
              ('POST', '/comment', {'workout_short_id': 'test', 'comment': 'test'}),
              ('POST', '/workout_like', {}),
              ('POST', '/workout_favorite', {}),
              ('PUT', '/me', {}),
              ('PATCH', '/me', {}),
          ]

          print('=== API DISCOVERY RESULTS ===')
          for method, path, body in endpoints:
              status, text = probe(method, path, body)
              if status not in (404, 405):
                  tag = 'FOUND!' if status in (200, 201, 204, 400, 422, 500) else str(status)
                  print(f'{tag:8s} {method:6s} {path}')
                  if text and status != 500:
                      print(f'         -> {text[:200]}')
          print('=== DONE ===')
          "

      - name: Update Vercel env vars via REST API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          python -c "
          import json, os, urllib.request

          TOKEN = os.environ['VERCEL_TOKEN']
          PROJECT = os.environ['VERCEL_PROJECT_ID']

          with open('tokens.json') as f:
              tokens = json.load(f)

          def call(method, path, body=None):
              url = f'https://api.vercel.com/v10/projects/{PROJECT}{path}'
              hdrs = {'Authorization': f'Bearer {TOKEN}', 'Content-Type': 'application/json'}
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, method=method, headers=hdrs, data=data)
              try:
                  resp = urllib.request.urlopen(req)
                  return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  print(f'  API error {e.code}: {e.read().decode()[:300]}')
                  raise

          resp = call('GET', '/env')
          env_map = {e['key']: e['id'] for e in resp.get('envs', [])}

          updates = [
              ('HEVY_ACCESS_TOKEN', tokens['access_token']),
              ('HEVY_REFRESH_TOKEN', tokens['refresh_token']),
              ('HEVY_TOKEN_EXPIRES', tokens['expires_at']),
          ]

          for key, val in updates:
              eid = env_map.get(key)
              if eid:
                  call('PATCH', f'/env/{eid}', {'value': val, 'type': 'sensitive'})
                  print(f'  Updated {key}')
              else:
                  call('POST', '/env', {'key': key, 'value': val, 'type': 'sensitive', 'target': ['production']})
                  print(f'  Created {key}')

          print('Env vars updated.')
          "

      - name: Redeploy Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          mkdir -p vercel/.vercel
          cat > vercel/.vercel/project.json << EOF
          {"projectId":"${VERCEL_PROJECT_ID}","orgId":"${VERCEL_ORG_ID}","projectName":"vercel"}
          EOF
          cd vercel
          npm install -g vercel > /dev/null 2>&1
          vercel --prod --yes --token $VERCEL_TOKEN
          echo "Redeployed — live in ~30s"
