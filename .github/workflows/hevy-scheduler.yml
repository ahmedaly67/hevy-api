name: Hevy Token Scheduler

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright requests
          playwright install --with-deps chromium

      - name: Refresh Hevy tokens
        env:
          HEVY_EMAIL: ${{ secrets.HEVY_EMAIL }}
          HEVY_PASSWORD: ${{ secrets.HEVY_PASSWORD }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          python -c "
          import os, json, time

          SITE_KEY = '6LfkQG0jAAAAANTrIkVXKPfSPHyJnt4hYPWqxh0R'

          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch(headless=True)
              page = browser.new_page()
              page.goto('https://hevy.com/login', wait_until='networkidle', timeout=15000)
              page.wait_for_timeout(3000)

              token = page.evaluate('''(sk) => {
                  return new Promise((res, rej) => {
                      grecaptcha.enterprise.ready(() => {
                          grecaptcha.enterprise.execute(sk, {action: 'login'}).then(res).catch(rej);
                      });
                  });
              }''', SITE_KEY)

              result = page.evaluate('''([email, passwd, t]) => {
                  return fetch('https://api.hevyapp.com/login', {
                      method: 'POST',
                      headers: {
                          'x-api-key': 'shelobs_hevy_web',
                          'hevy-platform': 'web',
                          'x-client-time': String(Date.now() / 1000),
                          'Content-Type': 'application/json',
                          'Accept': 'application/json',
                      },
                      body: JSON.stringify({emailOrUsername: email, password: passwd, recaptchaToken: t}),
                  }).then(r => r.json().then(data => ({status: r.status, data})));
              }''', [os.environ['HEVY_EMAIL'], os.environ['HEVY_PASSWORD'], token])

              browser.close()

          if result['status'] != 200:
              print(f'LOGIN FAILED: {result[\"data\"]}')
              exit(1)

          tokens = result['data']
          print(f'Login OK. Expires: {tokens[\"expires_at\"]}')

          with open('tokens.json', 'w') as f:
              json.dump(tokens, f)
          "

      - name: API Discovery — Test workout creation
        run: |
          python -c "
          import json, urllib.request, urllib.error

          with open('tokens.json') as f:
              tokens = json.load(f)
          at = tokens['access_token']

          HEADERS = {
              'x-api-key': 'shelobs_hevy_web',
              'hevy-platform': 'web',
              'Authorization': f'Bearer {at}',
              'Content-Type': 'application/json',
              'Accept': 'application/json',
          }

          def call(method, path, body=None):
              url = f'https://api.hevyapp.com{path}'
              data = json.dumps(body or {}).encode() if body else None
              req = urllib.request.Request(url, method=method, headers=dict(HEADERS), data=data)
              try:
                  resp = urllib.request.urlopen(req, timeout=10)
                  return resp.status, json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  try: return e.code, json.loads(e.read())
                  except: return e.code, {'_text': e.read().decode()[:300]}
              except Exception as e:
                  return 0, {'_error': str(e)}

          # Step 1: Get exercise templates (try multiple paths)
          print('Getting exercise templates...')
          status, data = (0, None)
          for ep in ['/v1/exercise_templates', '/exercise_templates', '/exercise-templates', '/custom_exercise_templates']:
              status, data = call('GET', ep)
              if status == 200: break
          if status == 200:
              templates = data if isinstance(data, list) else data.get('exercise_templates', data.get('data', []))
              print(f'Got {len(templates)} templates from {ep}')
              if templates:
                  ex_id = templates[0].get('id', templates[0].get('exercise_template_id'))
                  ex_name = templates[0].get('title', '?')
                  print(f'Using: {ex_id} ({ex_name})')
              else:
                  ex_id = '05293BCA'
          else:
              print(f'Failed to get templates: {status}')
              ex_id = '05293BCA'

          # Step 2: Try workout creation with multiple path/body variations
          print(f'Creating workout with template {ex_id}...')
          
          base_exercise = {
              'exercise_template_id': ex_id,
              'superset_id': None,
              'notes': 'API test set',
              'sets': [{
                  'type': 'normal', 'weight_kg': 80, 'reps': 10,
                  'distance_meters': None, 'duration_seconds': None,
                  'custom_metric': None, 'rpe': 8.0
              }]
          }

          attempts = [
              # Try exact Swagger format on different paths
              ('/v1/workout', {'workout': {'title': 'API Test', 'description': '', 'start_time': '2026-06-28T15:00:00Z', 'end_time': '2026-06-28T15:30:00Z', 'is_private': True, 'exercises': [base_exercise]}}),
              ('/workout', {'workout': {'title': 'API Test', 'description': '', 'start_time': '2026-06-28T15:00:00Z', 'end_time': '2026-06-28T15:30:00Z', 'is_private': True, 'exercises': [base_exercise]}}),
              ('/v2/workout', {'workout': {'title': 'API Test', 'description': '', 'start_time': '2026-06-28T15:00:00Z', 'end_time': '2026-06-28T15:30:00Z', 'is_private': True, 'exercises': [base_exercise]}}),
              # Try without workout wrapper
              ('/workout', {'title': 'API Test', 'description': '', 'start_time': '2026-06-28T15:00:00Z', 'end_time': '2026-06-28T15:30:00Z', 'is_private': True, 'exercises': [base_exercise]}),
              ('/v2/workout', {'title': 'API Test', 'description': '', 'start_time': '2026-06-28T15:00:00Z', 'end_time': '2026-06-28T15:30:00Z', 'is_private': True, 'exercises': [base_exercise]}),
              # Try v1/workouts plural
              ('/v1/workouts', {'workout': {'title': 'API Test', 'description': '', 'start_time': '2026-06-28T15:00:00Z', 'end_time': '2026-06-28T15:30:00Z', 'is_private': True, 'exercises': [base_exercise]}}),
              # Try /workouts plural with wrapper
              ('/workouts', {'workout': {'title': 'API Test', 'description': '', 'start_time': '2026-06-28T15:00:00Z', 'end_time': '2026-06-28T15:30:00Z', 'is_private': True, 'exercises': [base_exercise]}}),
              # Try with query params
              ('/workout?sendSyncEventToMobileApp=true', {'workout': {'title': 'API Test', 'description': '', 'start_time': '2026-06-28T15:00:00Z', 'end_time': '2026-06-28T15:30:00Z', 'is_private': True, 'exercises': [base_exercise]}}),
              # Try with just exercises (minimal)
              ('/workout', {'workout': {'title': 'API Test', 'exercises': [base_exercise]}}),
          ]

          for path, body in attempts:
              status, response = call('POST', path, body)
              if status in (200, 201):
                  print(f'*** SUCCESS: POST {path} -> {status} ***')
                  print(json.dumps(response, indent=2)[:500])
                  break
              elif status not in (404, 405):
                  if isinstance(response, dict):
                      resp_text = json.dumps(response)[:300]
                  else:
                      resp_text = str(response)[:300]
                  print(f'  POST {path} -> {status}: {resp_text}')

          print('=== DISCOVERY DONE ===')
          "

      - name: Update Vercel env vars via REST API
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          python -c "
          import json, os, urllib.request

          TOKEN = os.environ['VERCEL_TOKEN']
          PROJECT = os.environ['VERCEL_PROJECT_ID']

          with open('tokens.json') as f:
              tokens = json.load(f)

          def call(method, path, body=None):
              url = f'https://api.vercel.com/v10/projects/{PROJECT}{path}'
              hdrs = {'Authorization': f'Bearer {TOKEN}', 'Content-Type': 'application/json'}
              data = json.dumps(body).encode() if body else None
              req = urllib.request.Request(url, method=method, headers=hdrs, data=data)
              try:
                  resp = urllib.request.urlopen(req)
                  return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  print(f'  API error {e.code}: {e.read().decode()[:300]}')
                  raise

          resp = call('GET', '/env')
          env_map = {e['key']: e['id'] for e in resp.get('envs', [])}

          updates = [
              ('HEVY_ACCESS_TOKEN', tokens['access_token']),
              ('HEVY_REFRESH_TOKEN', tokens['refresh_token']),
              ('HEVY_TOKEN_EXPIRES', tokens['expires_at']),
          ]

          for key, val in updates:
              eid = env_map.get(key)
              if eid:
                  call('PATCH', f'/env/{eid}', {'value': val, 'type': 'sensitive'})
                  print(f'  Updated {key}')
              else:
                  call('POST', '/env', {'key': key, 'value': val, 'type': 'sensitive', 'target': ['production']})
                  print(f'  Created {key}')

          print('Env vars updated.')
          "

      - name: Redeploy Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
        run: |
          mkdir -p vercel/.vercel
          cat > vercel/.vercel/project.json << EOF
          {"projectId":"${VERCEL_PROJECT_ID}","orgId":"${VERCEL_ORG_ID}","projectName":"vercel"}
          EOF
          cd vercel
          npm install -g vercel > /dev/null 2>&1
          vercel --prod --yes --token $VERCEL_TOKEN
          echo "Redeployed — live in ~30s"
